name: Deploy Site

# Builds the Astro marketing + docs site under site/ and deploys it to GitHub Pages.
#
# Honest caveat — private repo: serving GitHub Pages from a PRIVATE repository to a
# public URL requires GitHub Pro / Team / Enterprise. While CorvidLabs/augur is private
# without a paid plan, the deploy job will not publish. This workflow is marketing PREP:
# everything builds and is ready, so publishing "just works" once the repo is made public
# (or a paid plan is enabled). Pages must be enabled once in the repo settings
# (Settings → Pages → Source: GitHub Actions); this workflow does not enable it.
#
# Runner choice: the build job runs on [self-hosted, macOS] to standardize with the rest of
# the repo (CI builds/tests/gates there too) and because it now needs the Swift toolchain:
# a pre-build step runs augur on the repo to emit the live badge JSON the README points at.
# The deploy job stays on ubuntu-latest: it only uploads the already-built artifact via
# actions/deploy-pages and needs no Swift toolchain, so it keeps the macOS runners free.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

# Run the bundled Node-20 JavaScript actions (checkout, upload/deploy-pages, etc.)
# on Node 24 to silence GitHub's Node-20 end-of-life deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Astro Site
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # augur needs history for the range

      - name: Build the live augur badge JSON
        run: |
          # Run augur on the repo and write a shields.io endpoint JSON to the site
          # root (site/public/* copies to the published root), so the README badge
          # at https://corvidlabs.github.io/augur/badge.json reflects the latest
          # verdict. Empty range (first commit) falls back to a neutral "ready".
          set +e
          swift build -c release
          RANGE=''
          if git rev-parse --verify -q HEAD~1 >/dev/null; then
            RANGE='HEAD~1..HEAD'
          fi
          VERDICT=''
          if [ -n "$RANGE" ]; then
            JSON=$(.build/release/augur check --range "$RANGE" --json)
            VERDICT=$(printf '%s' "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('verdict',''))")
          fi
          case "$VERDICT" in
            proceed) MESSAGE='proceed'; COLOR='brightgreen' ;;
            review)  MESSAGE='review';  COLOR='yellow' ;;
            block)   MESSAGE='block';   COLOR='red' ;;
            *)       MESSAGE='ready';   COLOR='blue' ;;
          esac
          python3 - "$MESSAGE" "$COLOR" <<'PY'
          import json, sys
          message, color = sys.argv[1], sys.argv[2]
          badge = {"schemaVersion": 1, "label": "augur", "message": message, "color": color}
          with open("site/public/badge.json", "w") as f:
              json.dump(badge, f)
              f.write("\n")
          PY
          echo "Wrote site/public/badge.json:" && cat site/public/badge.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: site
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
