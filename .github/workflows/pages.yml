name: Deploy Site

# Builds the Astro marketing + docs site under site/ and deploys it to GitHub Pages.
#
# Honest caveat — private repo: serving GitHub Pages from a PRIVATE repository to a
# public URL requires GitHub Pro / Team / Enterprise. While CorvidLabs/augur is private
# without a paid plan, the deploy job will not publish. This workflow is marketing PREP:
# everything builds and is ready, so publishing "just works" once the repo is made public
# (or a paid plan is enabled). Pages must be enabled once in the repo settings
# (Settings → Pages → Source: GitHub Actions); this workflow does not enable it.
#
# Runner choice: the build job runs on ubuntu-latest (Bun only, no Swift) so site deploys
# never queue behind the self-hosted macOS runner. The README badge endpoint is served from
# a static site/public/badge.json instead of a live per-commit augur verdict; tradeoff: the
# badge no longer reflects the latest verdict, but it is stable and decoupled from Swift.
# The deploy job also runs on ubuntu-latest and only uploads the already-built artifact.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
      - 'CHANGELOG.md'   # the header version badge reads from here, so rebuild on release
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

# Run the bundled Node-20 JavaScript actions (checkout, upload/deploy-pages, etc.)
# on Node 24 to silence GitHub's Node-20 end-of-life deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Astro Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # Astro Header reads the version from CHANGELOG.md at build time

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Build site
        working-directory: site
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
