name: CI

# Path-scoped so a docs/README/LICENSE-only change triggers nothing: the build,
# test, spec, and dogfood steps only run when the Swift sources, the package
# manifest, the action wiring, the specs, or this workflow itself change.
on:
  push:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'action.yml'
      - 'specs/**'
      - 'fledge.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'action.yml'
      - 'specs/**'
      - 'fledge.toml'
      - '.github/workflows/ci.yml'

# Cancel an in-flight CI run for the same ref when a newer commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Run the bundled Node-20 JavaScript actions (e.g. actions/checkout) on Node 24 to
# silence GitHub's Node-20 end-of-life deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test-macos:
    # GitHub-hosted, ephemeral runner. Never use self-hosted runners on a public
    # repo: a pull_request from a fork would run untrusted code on the host.
    # macOS is the authoritative gate: full build, test, spec, and the dogfood
    # steps (which post commit statuses / PR comments) run here.
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
      # `statuses: write` lets the dogfood step post augur's verdict as a commit
      # status, so the result shows as a check on the commit and PR pages.
      statuses: write
      # `pull-requests: write` lets the PR-report step post/update a sticky
      # comment carrying the per-file risk table.
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Install fledge
        run: brew install corvidlabs/tap/fledge
      - run: swift build
      - run: swift test
      - run: fledge spec check
      - name: Dogfood - build the release binary augur ships
        run: swift build -c release
      - name: Resolve the assessment range (meaningful on PRs)
        id: range
        run: |
          # On a pull_request, the meaningful diff is the WHOLE PR: every commit
          # from the base branch tip to HEAD. Fetch the base first so the range
          # resolves, then use origin/<base>..HEAD. On a push to main, the diff is
          # the just-landed commit (HEAD~1..HEAD). Fall back to an empty range on a
          # brand-new repo so a first commit never errors.
          RANGE=''
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=200 || true
            if git rev-parse --verify -q "origin/${{ github.base_ref }}" >/dev/null; then
              RANGE="origin/${{ github.base_ref }}..HEAD"
            fi
          fi
          if [ -z "$RANGE" ]; then
            git fetch --no-tags --depth=50 origin main 2>/dev/null || true
            if git rev-parse --verify -q HEAD~1 >/dev/null; then
              RANGE='HEAD~1..HEAD'
            fi
          fi
          echo "augur assessment range: '${RANGE:-<empty / first commit>}'"
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
      - name: Dogfood - augur assesses its own change (verdict in the log)
        run: |
          RANGE='${{ steps.range.outputs.range }}'
          # Print the full human verdict to the CI log (never fatal here).
          if [ -n "$RANGE" ]; then
            .build/release/augur check --range "$RANGE" || true
          else
            echo "No prior commit to diff against - skipping self-check."
          fi
      - name: Dogfood - augur gates itself (fatal only on a block-level verdict)
        run: |
          RANGE='${{ steps.range.outputs.range }}'
          # `gate --threshold block` exits non-zero ONLY on a block verdict, so a
          # genuinely dangerous self-change fails CI while proceed/review pass.
          # An empty range (first commit) short-circuits to success.
          if [ -n "$RANGE" ]; then
            .build/release/augur gate --range "$RANGE" --threshold block
          else
            echo "No range to gate - passing."
          fi
      - name: Dogfood - post augur's verdict as a GitHub commit status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Surface augur's verdict in the GitHub web UI: post a commit status on
          # the head SHA so it appears as the `augur` check on the commit and PR.
          # Best-effort by design: a token/permission hiccup must never redden CI,
          # but the default GITHUB_TOKEN with `statuses: write` is enough to work.
          # The range is the shared PR-aware range, so on a PR the risk number
          # reflects the whole PR diff (origin/<base>..HEAD), not just one commit.
          set +e
          SHA='${{ github.event.pull_request.head.sha || github.sha }}'
          RANGE='${{ steps.range.outputs.range }}'
          if [ -z "$RANGE" ]; then
            echo "No range (empty / first commit), skipping commit status."
            exit 0
          fi
          JSON=$(.build/release/augur check --range "$RANGE" --json)
          # Parse the verdict and risk score from augur's JSON.
          VERDICT=$(printf '%s' "$JSON" | python3 -c "import sys,json; print(json.load(sys.stdin).get('verdict',''))")
          RISK=$(printf '%s' "$JSON" | python3 -c "import sys,json; print(round(json.load(sys.stdin).get('riskScore',0)))")
          if [ -z "$VERDICT" ]; then
            echo "Empty verdict, skipping commit status."
            exit 0
          fi
          # Map: proceed/review -> success, block -> failure (a block-level change
          # then shows a red check on the PR).
          case "$VERDICT" in
            block) STATE='failure' ;;
            *)     STATE='success' ;;
          esac
          DESC="${VERDICT} · risk ${RISK}/100"
          gh api -X POST "repos/${{ github.repository }}/statuses/${SHA}" \
            -f state="$STATE" \
            -f context=augur \
            -f description="$DESC" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            && echo "Posted augur commit status: $STATE ($DESC)" \
            || echo "status post skipped"
      - name: Dogfood - PR job summary + sticky comment with the risk table
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Render augur's markdown report for the whole PR diff, drop it onto the
          # Actions run summary page, and post/update a sticky PR comment so the
          # per-file risk table is visible without opening the run. Best-effort:
          # a permissions hiccup must never redden CI.
          set +e
          RANGE='${{ steps.range.outputs.range }}'
          if [ -z "$RANGE" ]; then
            echo "No PR range, skipping report."
            exit 0
          fi
          .build/release/augur check --range "$RANGE" --markdown > augur-report.md
          # Show it on the Actions run summary page.
          cat augur-report.md >> "$GITHUB_STEP_SUMMARY"
          # Find an existing sticky comment by the hidden marker, then PATCH it in
          # place if found, else POST a new one. The marker lives on its own line
          # in the rendered report (<!-- augur-report -->).
          PR='${{ github.event.pull_request.number }}'
          REPO='${{ github.repository }}'
          EXISTING=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
            | python3 -c "import sys,json; cs=json.load(sys.stdin); print(next((c['id'] for c in cs if '<!-- augur-report -->' in c.get('body','')), ''))" 2>/dev/null)
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING}" -F body=@augur-report.md \
              && echo "Updated sticky augur comment ${EXISTING}" \
              || echo "comment skipped"
          else
            gh api -X POST "repos/${REPO}/issues/${PR}/comments" -F body=@augur-report.md \
              && echo "Posted sticky augur comment" \
              || echo "comment skipped"
          fi

  build-test-linux:
    # Linux build + test on a GitHub-hosted Ubuntu runner, inside the official
    # Swift 6 container (Ubuntu runners have no Swift toolchain preinstalled).
    # This proves AugurKit and the CLI compile and pass their tests on Linux on
    # every commit. The macOS job above owns the fledge / dogfood / commit-status
    # steps; Linux deliberately runs only build + test.
    runs-on: ubuntu-latest
    container: swift:6.0
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      # The repo is checked out by a different user than the container runs as,
      # so mark it safe before any git command the tests invoke.
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: swift build
      - run: swift test

  smoke-test-action:
    # Dogfood the bundled composite action (`uses: ./`) end to end: install →
    # checksum → assess → gate. The other jobs run augur via `.build/release`
    # directly, so action.yml's wiring (binary install, sha verification, the
    # injection-safe env handling, version resolution) is otherwise untested.
    # Run on BOTH hosted runners. macOS has a Swift toolchain so the source-build
    # fallback always works; ubuntu-latest has none, so it exercises the prebuilt
    # Linux download path -- the path that shipped a dynamically-linked binary
    # failing at runtime with a missing libswiftCore.so. A macOS-only smoke can't
    # catch that. (The ubuntu leg relies on the latest release's Linux asset.)
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # the action's range needs history
      - name: Run the bundled action against this checkout
        id: augur
        uses: ./
        # A genuine block verdict must not fail this WIRING smoke test; the
        # assertion below checks the action actually ran, not what it decided.
        continue-on-error: true
        with:
          range: HEAD~1..HEAD
          threshold: block
      - name: Assert the action installed augur and produced a verdict
        env:
          VERDICT: ${{ steps.augur.outputs.verdict }}
          RISK: ${{ steps.augur.outputs.risk }}
          BINARY: ${{ steps.augur.outputs.binary }}
        run: |
          set -euo pipefail
          if [ -z "$VERDICT" ]; then
            echo "::error::The action produced no verdict — install/assess wiring is broken."
            exit 1
          fi
          echo "Action OK — verdict=$VERDICT risk=$RISK/100 binary=$BINARY"

  package-linux:
    # Exercise release.yml's Linux packaging on every PR so container/shell
    # regressions (a tool absent from swift:6.0, a dash-vs-bash slip) surface
    # here instead of at tag time. Mirrors release.yml's `build-linux` script
    # minus the upload. NOTE: the `gh release`/tag-move steps need a real
    # release and are NOT exercised here — keep this in sync with release.yml by
    # hand.
    runs-on: ubuntu-latest
    container: swift:6.0
    timeout-minutes: 25
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Build and package the Linux binary (no upload)
        run: |
          set -euo pipefail
          # Match release.yml: statically link the Swift runtime so the binary
          # runs on a bare ubuntu-latest runner (no Swift toolchain). This job
          # runs INSIDE swift:6.0 (runtime present), so --version alone can't
          # catch a dynamic link -- the ldd guard below is what actually does.
          swift build -c release --static-swift-stdlib
          cp "$(swift build -c release --static-swift-stdlib --show-bin-path)/augur" augur-linux-x86_64
          file augur-linux-x86_64 || true
          ldd augur-linux-x86_64 2>/dev/null | grep -i swift && \
            { echo "::error::binary still dynamically links the Swift runtime"; exit 1; } || true
          sha256sum augur-linux-x86_64 | cut -d' ' -f1 > augur-linux-x86_64.sha256
          cat augur-linux-x86_64.sha256
          test -x augur-linux-x86_64
          ./augur-linux-x86_64 --version

  guard-no-self-hosted:
    # Security tripwire: this repo is PUBLIC, so a self-hosted runner would let a
    # fork PR run untrusted code on our own machines. Fail if any workflow ever
    # targets one. Covers `runs-on: self-hosted`, `[self-hosted, ...]`, and the
    # multi-line list form; `#` comments (which legitimately mention the policy)
    # are stripped before matching.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Assert no workflow uses a self-hosted runner
        run: |
          set -euo pipefail
          python3 -c "import yaml" 2>/dev/null || pip install -q pyyaml
          # Inspect only each job's `runs-on` (string, list, or {labels} object),
          # so the check can't false-match prose, job names, or echo strings that
          # contain the word — including this job's own definition.
          python3 - <<'PY'
          import sys, glob, yaml
          bad = []
          for f in sorted(glob.glob(".github/workflows/*.yml") + glob.glob(".github/workflows/*.yaml")):
              try:
                  doc = yaml.safe_load(open(f)) or {}
              except Exception as e:
                  print(f"::warning::could not parse {f}: {e}")
                  continue
              for jname, job in (doc.get("jobs") or {}).items():
                  if not isinstance(job, dict):
                      continue
                  ro = job.get("runs-on")
                  if isinstance(ro, str):
                      labels = [ro]
                  elif isinstance(ro, list):
                      labels = [str(x) for x in ro]
                  elif isinstance(ro, dict):
                      lbls = ro.get("labels", [])
                      labels = [lbls] if isinstance(lbls, str) else [str(x) for x in lbls]
                  else:
                      labels = []
                  if any("self-hosted" in s.lower() for s in labels):
                      bad.append(f"{f}: job '{jname}' runs-on={ro!r}")
          if bad:
              print("::error::A workflow targets a self-hosted runner. Public repos must use GitHub-hosted runners only.")
              for b in bad:
                  print("  " + b)
              sys.exit(1)
          print("OK: no self-hosted runner targeting in any workflow.")
          PY

  attest:
    name: Record attestation
    runs-on: ubuntu-latest
    # Depend on every gate job, not just the build/test pair: an attestation
    # records "proceed", so it must not sign off on a commit where any real check
    # (the action smoke test, the Linux package, or the self-hosted guard) failed.
    needs: [build-test-macos, build-test-linux, smoke-test-action, package-linux, guard-no-self-hosted]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # contents: write lets the step push refs/notes/attest.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # augur enforces its own risk gate in CI; this closes the loop by recording
      # a provenance attestation on each merged commit and pushing it to
      # refs/notes/attest, so augur builds a trust ledger (and its /trust/ attest
      # pip lights). attest ships a public Linux binary (checksum-verified), so no
      # token is needed; the step is additive and best-effort, so a hiccup logs a
      # warning and never fails CI.
      - name: Record attestation (attest)
        env:
          ATTEST_VERSION: v0.5.0
        run: |
          base="https://github.com/CorvidLabs/attest/releases/download/${ATTEST_VERSION}"
          bin="${RUNNER_TEMP}/attest"; sum="${bin}.sha256"
          retry="--retry 5 --retry-connrefused --retry-delay 1"
          if curl -fsSL $retry "${base}/attest-linux-x86_64" -o "$bin" \
            && curl -fsSL $retry "${base}/attest-linux-x86_64.sha256" -o "$sum" \
            && want="$(awk '{print $1}' "$sum")" && [ -n "$want" ] \
            && printf '%s  %s\n' "$want" "$bin" | sha256sum -c - ; then
            chmod +x "$bin"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git fetch origin "+refs/notes/attest:refs/notes/attest" 2>/dev/null || true
            if "$bin" sign --commit HEAD --reviewer agent:ci --confidence 0.9 --tests-passed \
                 --verdict proceed --note "CI: swift build + test + augur self-gate green" \
               && git push origin refs/notes/attest ; then
              echo "attestation recorded for $(git rev-parse --short HEAD)"
            else
              echo "::warning::attest sign/push failed; provenance not recorded this run"
            fi
          else
            echo "::warning::attest download/verify failed; provenance not recorded this run"
          fi
