name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  build-test:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test
      - run: fledge spec check
      - run: swift run augur gate --range HEAD~1..HEAD --threshold block || true  # dogfood (non-fatal)
