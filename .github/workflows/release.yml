name: Release

# Builds the release binaries for a tag and uploads each (plus a sha256 sidecar)
# to the GitHub release:
#   - augur-macos-universal   (arm64 + x86_64)  -> Homebrew formula + the action
#   - augur-linux-x86_64                          -> the action on Ubuntu runners
# The macOS sidecar is what post-release-formula.yml reads to bump the Homebrew
# formula in CorvidLabs/homebrew-tap, so the macOS job must run and succeed
# before the formula can move. The composite action (action.yml) downloads
# whichever asset matches the consumer's runner, so both must exist for the
# Marketplace action to work without a Swift toolchain.
#
# GitHub-hosted macos-latest is used on purpose: it ships a Swift toolchain and
# keeps releases off the queued self-hosted runner. Linux builds inside the
# official swift:6.0 container (Ubuntu runners have no Swift preinstalled).

permissions:
  contents: write

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build universal macOS binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          set -euo pipefail
          # Prefer a true universal (arm64 + x86_64) binary. If the x86_64
          # cross-build fails on the runner, fall back to arm64-only and keep
          # the universal name so the formula/url stays stable.
          if swift build -c release --arch arm64 --arch x86_64; then
            echo "Built universal (arm64 + x86_64)."
            cp .build/apple/Products/Release/augur augur-macos-universal
          else
            echo "::warning::Universal build failed; falling back to arm64-only (named augur-macos-universal)."
            swift build -c release --arch arm64
            cp .build/apple/Products/Release/augur augur-macos-universal
          fi
          file augur-macos-universal

      - name: Compute sha256 sidecar
        run: |
          set -euo pipefail
          shasum -a 256 augur-macos-universal | cut -d' ' -f1 > augur-macos-universal.sha256
          cat augur-macos-universal.sha256

      - name: Resolve tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload binary + sidecar to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          # Create the release if it does not exist yet, then upload (clobbering
          # any prior assets of the same name so re-runs are idempotent).
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" \
            augur-macos-universal \
            augur-macos-universal.sha256 \
            --clobber

  build-linux:
    name: Build Linux x86_64 binary
    runs-on: ubuntu-latest
    # The bare swift:6.0 image has no `gh`, so this job only BUILDS and hands the
    # artifacts off; upload-linux (on the host runner, which has gh) publishes them.
    container: swift:6.0
    timeout-minutes: 25
    # The container's default shell is dash (`sh`), which rejects `set -o pipefail`.
    # Force bash for every run step in this job so the scripts behave like the
    # host-runner jobs.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build release binary + sha256 sidecar
        run: |
          set -euo pipefail
          # --static-swift-stdlib bundles the Swift runtime into the binary.
          # Without it the binary dynamically links libswiftCore.so etc., which a
          # bare ubuntu-latest runner (no Swift toolchain) lacks -- so the action's
          # whole "no toolchain needed" promise fails with a missing-.so error.
          swift build -c release --static-swift-stdlib
          cp "$(swift build -c release --static-swift-stdlib --show-bin-path)/augur" augur-linux-x86_64
          # `file` is just a diagnostic and is absent from the swift container.
          file augur-linux-x86_64 || true
          # ldd is best-effort: fail loudly if any Swift runtime .so is still
          # dynamically linked (a guard against silently shipping a broken binary).
          ldd augur-linux-x86_64 2>/dev/null | grep -i swift && \
            { echo "::error::binary still dynamically links the Swift runtime"; exit 1; } || true
          sha256sum augur-linux-x86_64 | cut -d' ' -f1 > augur-linux-x86_64.sha256
          cat augur-linux-x86_64.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: augur-linux-x86_64
          path: |
            augur-linux-x86_64
            augur-linux-x86_64.sha256
          if-no-files-found: error
          retention-days: 1

  upload-linux:
    name: Publish Linux binary to release
    runs-on: ubuntu-latest
    # Depend on `build` (macOS) too: that job owns release creation, so by the
    # time this runs the release exists — no race to `gh release create`.
    needs: [build, build-linux]
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: augur-linux-x86_64

      - name: Resolve tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload binary + sidecar to release
        env:
          GH_TOKEN: ${{ github.token }}
          # This job has no checkout, so `gh` can't infer the repo from git.
          # GH_REPO targets it explicitly for every `gh release` subcommand.
          GH_REPO: ${{ github.repository }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          # The macOS `build` job (a dependency) already created the release;
          # create-if-missing remains only as insurance. Upload clobbers prior
          # assets of the same name so re-runs are idempotent.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          gh release upload "$TAG" \
            augur-linux-x86_64 \
            augur-linux-x86_64.sha256 \
            --clobber

  move-major-tag:
    name: Move the major (v0) tag
    runs-on: ubuntu-latest
    # Only after both binaries are published, so `@v0` never points at a commit
    # whose release lacks assets. Force-updates the major tag (v0 for v0.x.y) to
    # this release's commit, so consumers can pin `uses: CorvidLabs/augur@v0` and
    # track the latest 0.x without editing their workflow.
    needs: [build, upload-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force-update the major tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Derive the major tag from the release tag: v0.3.0 -> v0, v1.2.3 -> v1.
          major="${REF_NAME%%.*}"
          case "$major" in
            v[0-9]*) ;;
            *) echo "::error::Unexpected tag '$REF_NAME'; cannot derive a major tag."; exit 1 ;;
          esac
          echo "Pointing $major at $GITHUB_SHA (from $REF_NAME)."
          git tag -f "$major" "$GITHUB_SHA"
          git push origin -f "refs/tags/$major"
