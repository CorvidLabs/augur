name: "augur gate"
# GitHub Marketplace caps this description at 125 characters.
description: "Deterministic change-risk gate for CI: fail when a diff's verdict reaches proceed, review, or block. No API key, no LLM."
author: "CorvidLabs"

inputs:
  range:
    description: "Git range to assess (e.g. origin/main..HEAD). Requires full history (checkout with fetch-depth: 0)."
    required: false
    default: "origin/main..HEAD"
  threshold:
    description: "Verdict at or above which to fail the job: proceed, review, or block."
    required: false
    default: "block"
  coverage:
    description: "Optional path to a coverage report (LCOV .info, Cobertura/JaCoCo .xml, or Go .out coverprofile)."
    required: false
    default: ""
  working-directory:
    description: "Directory to run augur in (the repository to gate). Defaults to the workspace root."
    required: false
    default: "."
  version:
    description: >-
      augur release to install (e.g. v0.3.0), or "latest". Defaults to the ref
      this action was pinned to when that is a release tag, otherwise "latest".
    required: false
    default: ""

outputs:
  verdict:
    description: "The computed verdict: proceed, review, or block."
    value: ${{ steps.assess.outputs.verdict }}
  risk:
    description: "The computed risk score (0-100)."
    value: ${{ steps.assess.outputs.risk }}
  binary:
    description: "Absolute path to the augur binary used."
    value: ${{ steps.install.outputs.binary }}

runs:
  using: "composite"
  steps:
    - name: Install augur
      id: install
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_PATH: ${{ github.action_path }}
        ACTION_REPO: ${{ github.action_repository }}
      run: |
        set -euo pipefail

        repo="${ACTION_REPO:-CorvidLabs/augur}"

        # Resolve which release to install, WITHOUT ever crossing a major
        # boundary. An explicit `version` wins; otherwise derive from the ref the
        # action was pinned to:
        #   @v0.3.0           -> install exactly v0.3.0
        #   @v0               -> newest v0.* release (the moving major tag has no
        #                        release of its own, so resolve it to a concrete
        #                        v0.* tag; a future v1 `latest` can never leak in)
        #   branch / sha      -> install the latest release
        # A requested tag with no matching asset does NOT silently fall back to a
        # different version; `bin` stays empty and we build from source below.
        ver="${INPUT_VERSION:-}"
        mode="latest"   # latest | tag | none
        target=""       # concrete release tag when mode=tag
        if [ -n "$ver" ]; then
          if [ "$ver" = "latest" ]; then mode="latest"; else mode="tag"; target="$ver"; fi
        elif printf '%s' "$ACTION_REF" | grep -Eq '^v[0-9]+$'; then
          # Moving major tag (e.g. v0): pick the newest release within that major.
          # gh lists newest-first, so the first v<major>.* tag is the latest one.
          major="$ACTION_REF"
          # `// empty` so an empty match yields "" (not the string "null", which
          # would be non-empty and trigger a bogus `gh release download null`).
          # No `2>/dev/null`: gh is silent on the normal empty case, so let real
          # errors (rate limit, auth) surface; `|| true` still keeps the fallback.
          target="$(gh release list --repo "$repo" --exclude-drafts --exclude-pre-releases \
            --limit 100 --json tagName \
            --jq "[.[].tagName | select(test(\"^${major}\\\\.\"))][0] // empty" || true)"
          if [ -n "$target" ]; then
            mode="tag"
          else
            mode="none"
            echo "::warning::No published ${major}.* release found; building from source."
          fi
        elif printf '%s' "$ACTION_REF" | grep -Eq '^v[0-9]+\.[0-9]'; then
          mode="tag"; target="$ACTION_REF"   # full release tag
        fi

        # Pick the release asset for this runner's OS/arch.
        os="$(uname -s)"
        arch="$(uname -m)"
        case "$os" in
          Darwin) asset="augur-macos-universal" ;;
          Linux)
            case "$arch" in
              x86_64|amd64) asset="augur-linux-x86_64" ;;
              *)            asset="" ;;
            esac
            ;;
          *) asset="" ;;
        esac

        tmp="$(mktemp -d)"
        bin=""

        download() {
          # Fetch $asset (+ sidecar) for the resolved release into $tmp. Returns
          # 0 only when the binary asset actually landed.
          rm -f "$tmp/$asset" "$tmp/$asset.sha256"
          if [ "$mode" = "latest" ]; then
            gh release download --repo "$repo" \
              --pattern "$asset" --pattern "$asset.sha256" \
              --dir "$tmp" --clobber 2>/dev/null || return 1
          else
            gh release download "$target" --repo "$repo" \
              --pattern "$asset" --pattern "$asset.sha256" \
              --dir "$tmp" --clobber 2>/dev/null || return 1
          fi
          [ -f "$tmp/$asset" ]
        }

        if [ -n "$asset" ] && [ "$mode" != "none" ]; then
          if download; then
            # Verify the checksum sidecar when present; a mismatch is fatal.
            if [ -f "$tmp/$asset.sha256" ]; then
              expected="$(cut -d' ' -f1 < "$tmp/$asset.sha256")"
              if command -v sha256sum >/dev/null 2>&1; then
                actual="$(sha256sum "$tmp/$asset" | cut -d' ' -f1)"
              else
                actual="$(shasum -a 256 "$tmp/$asset" | cut -d' ' -f1)"
              fi
              if [ "$expected" != "$actual" ]; then
                echo "::error::augur checksum mismatch for $asset (expected $expected, got $actual)."
                exit 1
              fi
              echo "Verified $asset against published sha256."
            else
              echo "::warning::No sha256 sidecar published for $asset; skipping checksum verification."
            fi
            chmod +x "$tmp/$asset"
            bin="$tmp/$asset"
            echo "Installed augur ($asset, ${target:-latest}) for $os/$arch."
          fi
        fi

        # Fallback: build from the action's OWN checkout (never the consumer's
        # tree) when no prebuilt binary fits this runner. Needs a Swift toolchain.
        if [ -z "$bin" ]; then
          if command -v swift >/dev/null 2>&1; then
            echo "::warning::No prebuilt augur for $os/$arch; building from source. Add a Swift toolchain to speed this up or use a supported runner."
            swift build -c release --package-path "$ACTION_PATH"
            # Ask SwiftPM for the bin dir rather than hardcoding .build/release
            # (mirrors release.yml; --show-bin-path only prints, never rebuilds).
            bindir="$(swift build -c release --package-path "$ACTION_PATH" --show-bin-path)"
            bin="$bindir/augur"
          else
            echo "::error::No prebuilt augur binary for $os/$arch and no Swift toolchain to build one. Use macOS or Linux x86_64 runners, or install Swift first."
            exit 1
          fi
        fi

        echo "binary=$bin" >> "$GITHUB_OUTPUT"

    - name: Assess (verdict + risk outputs, never fatal)
      id: assess
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        AUGUR: ${{ steps.install.outputs.binary }}
        # Inputs go through env, never interpolated into the script, so a caller
        # wiring untrusted data (e.g. a PR title) into `range` can't inject shell.
        RANGE: ${{ inputs.range }}
      run: |
        # Best-effort second pass that only populates the verdict/risk outputs.
        # The gate step below re-runs and is what enforces the threshold, so a
        # hiccup here must never fail the job (hence the separate `augur check`).
        set +e
        verdict=""; risk=""
        json="$("$AUGUR" check --range "$RANGE" --json 2>/dev/null)"
        if [ -n "$json" ] && command -v jq >/dev/null 2>&1; then
          verdict="$(printf '%s' "$json" | jq -r '.verdict // empty')"
          risk="$(printf '%s' "$json" | jq -r '(.riskScore // 0) | round')"
        fi
        echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
        echo "risk=$risk" >> "$GITHUB_OUTPUT"
        echo "augur verdict: ${verdict:-unknown} · risk ${risk:-?}/100"

    - name: Gate (fail at or above threshold)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        AUGUR: ${{ steps.install.outputs.binary }}
        # Inputs through env, never interpolated into the script (injection-safe).
        RANGE: ${{ inputs.range }}
        THRESHOLD: ${{ inputs.threshold }}
        COVERAGE: ${{ inputs.coverage }}
      run: |
        set -euo pipefail
        args=(gate --range "$RANGE" --threshold "$THRESHOLD")
        if [ -n "$COVERAGE" ]; then
          args+=(--coverage "$COVERAGE")
        fi
        "$AUGUR" "${args[@]}"

branding:
  icon: "eye"
  color: "purple"
